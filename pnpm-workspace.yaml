# Reference clones (solid-charts/, ag-charts/) are intentionally NOT listed here —
# they keep their own toolchains and are read-only inspiration.
packages:
  - packages/*
  - apps/*
allowBuilds:
  '@biomejs/biome': true
  esbuild: true
  sharp: false
  workerd: true
onlyBuiltDependencies:
  - '@biomejs/biome'
  - esbuild
  - workerd
